<svg fill="none" viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="planet" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6C3CE1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="256" x2="512" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.2"/>
      <stop offset="0.2" stop-color="#22D3EE" stop-opacity="0.8"/>
      <stop offset="0.8" stop-color="#6C3CE1" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#6C3CE1" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Glowing background ring -->
  <ellipse cx="256" cy="256" rx="220" ry="75" transform="rotate(-25 256 256)" stroke="url(#ring)" stroke-width="25" filter="url(#glow)"/>
  
  <!-- Back half of the ring (simulated by drawing planet over the full ring above, then drawing the front half of the ring) -->
  
  <!-- Main Planet Body -->
  <circle cx="256" cy="256" r="130" fill="url(#planet)"/>
  
  <!-- Planet Core Glow -->
  <circle cx="210" cy="210" r="90" fill="#FFFFFF" fill-opacity="0.15" filter="url(#glow)"/>
  
  <!-- Star 1 -->
  <circle cx="100" cy="120" r="8" fill="#FFFFFF" filter="url(#glow)"/>
  <!-- Star 2 -->
  <circle cx="420" cy="180" r="5" fill="#FFFFFF" filter="url(#glow)"/>
  <!-- Star 3 -->
  <circle cx="150" cy="400" r="10" fill="#FFFFFF" filter="url(#glow)"/>

  <!-- Front half of the ring to overlap the planet -->
  <path d="M 55 162 A 220 75 0 0 0 456 350" transform="rotate(-25 256 256)" fill="none" stroke="url(#ring)" stroke-width="25" stroke-linecap="round" filter="url(#glow)"/>
</svg>
